name: "Assign CodeQL Alerts to Devin"

on:
  code_scanning_alert:
    types: [ created ]

jobs:
  assign-to-devin:
    name: Create Devin session for CodeQL alert
    runs-on: ubuntu-latest
    if: github.event.alert.tool.name == 'CodeQL'
    permissions:
      security-events: read
      contents: read

    steps:
      - name: Create Devin session for alert
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          DEVIN_PLAYBOOK_ID: ${{ secrets.DEVIN_PLAYBOOK_ID }}
        run: |
          RULE_ID="${{ github.event.alert.rule.id }}"
          RULE_DESC="${{ github.event.alert.rule.description }}"
          SEVERITY="${{ github.event.alert.rule.severity }}"
          FILE_PATH="${{ github.event.alert.most_recent_instance.location.path }}"
          START_LINE="${{ github.event.alert.most_recent_instance.location.start_line }}"
          END_LINE="${{ github.event.alert.most_recent_instance.location.end_line }}"
          ALERT_URL="${{ github.event.alert.html_url }}"
          REPO="${{ github.repository }}"
          REF="${{ github.event.alert.most_recent_instance.ref }}"

          PROMPT=$(cat <<EOF
          Fix a CodeQL vulnerability in the ${REPO} repository.

          ## CodeQL Alert Details
          - **Rule**: ${RULE_ID}
          - **Description**: ${RULE_DESC}
          - **Severity**: ${SEVERITY}
          - **File**: ${FILE_PATH}
          - **Lines**: ${START_LINE}-${END_LINE}
          - **Alert URL**: ${ALERT_URL}
          - **Ref**: ${REF}

          ## Instructions
          1. Clone the ${REPO} repository
          2. Review the vulnerable code at ${FILE_PATH}:${START_LINE}-${END_LINE}
          3. Apply a minimal, targeted fix for the ${RULE_ID} CodeQL rule
          4. Create a PR with the fix targeting main
          EOF
          )

          # Build JSON payload
          PAYLOAD=$(jq -n \
            --arg prompt "$PROMPT" \
            --arg playbook_id "$DEVIN_PLAYBOOK_ID" \
            '{
              prompt: $prompt,
              playbook_id: $playbook_id
            }')

          # Create Devin session via API
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.devin.ai/v3/organizations/${DEVIN_ORG_ID}/sessions" \
            -H "Authorization: Bearer ${DEVIN_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            SESSION_URL=$(echo "$BODY" | jq -r '.url // "N/A"')
            SESSION_ID=$(echo "$BODY" | jq -r '.session_id // "N/A"')
            echo "✅ Devin session created successfully"
            echo "   Session ID: ${SESSION_ID}"
            echo "   Session URL: ${SESSION_URL}"
            echo "   Rule: ${RULE_ID}"
            echo "   File: ${FILE_PATH}:${START_LINE}"
          else
            echo "❌ Failed to create Devin session (HTTP ${HTTP_CODE})"
            echo "   Response: ${BODY}"
            exit 1
          fi
